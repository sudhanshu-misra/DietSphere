<!DOCTYPE html>

<html lang="en-IN">

<head>
    <meta charset="utf-8" name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | DietSphere</title>

```
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="{{ url_for('static', filename='css/auth.css') }}" rel="stylesheet">

<script>
    function togglePassword(id) {
        const input = document.getElementById(id);
        input.type = input.type === "password" ? "text" : "password";
    }

    function loginUser(event) {
        event.preventDefault();

        const email = document.querySelector('input[name="email"]').value;
        const password = document.querySelector('input[name="password"]').value;

        fetch("http://127.0.0.1:5000/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ email, password })
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === "success") {
                // Redirect to dashboard
                window.location.href = `http://127.0.0.1:5000/dashboard/${data.user_id}`;
            } else {
                alert(data.message || "Login failed");
            }
        })
        .catch(err => {
            console.error(err);
            alert("Server error");
        });
    }
</script>
```

</head>

<body>

```
<div class="auth-card">
    <h2 class="auth-title">DietSphere Login</h2>

    <!-- ✅ UPDATED FORM -->
    <form onsubmit="loginUser(event)">

        <div class="mb-3">
            <input class="form-control" type="email" name="email" placeholder="Email" required>
        </div>

        <div class="mb-3">
            <div class="input-group">
                <input id="password" class="form-control" type="password" name="password" placeholder="Password" required>
                <button class="btn btn-light" type="button" onclick="togglePassword('password')">👁</button>
            </div>
        </div>

        <button type="submit" class="btn btn-primary w-100">Login</button>

    </form>

    <div class="auth-footer">
        <p>Don't have an account? <a href="/register">Register</a></p>
    </div>
</div>
```

</body>
</html>
